name: Telegram Bot CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  # Джоба 1: Проверка кода
  test_and_lint:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем код
        uses: actions/checkout@v4

      - name: Настраиваем Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Устанавливаем зависимости
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Проверяем код линтером (flake8)
        run: |
          # Остановит пайплайн, если есть грубые синтаксические ошибки
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # Джоба 2: Деплой (Запустится только если Джоба 1 прошла успешно)
  deploy:
    needs: test_and_lint 
    runs-on: ubuntu-latest
    steps:
      - name: Деплой на сервер
        run: echo "Здесь"
